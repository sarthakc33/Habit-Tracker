<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reality Check – Plant Focus</title>
  <link rel="stylesheet" href="/css/style.css?v=11">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    @property --p {
      syntax: '<percentage>';
      inherits: false;
      initial-value: 0%;
    }
    .plant-container { max-width: 600px; margin: 0 auto; text-align: center; padding-bottom: 40px;}
    .circle-timer {
      position: relative; width: 280px; height: 280px; margin: 30px auto;
      border-radius: 50%; background: #644117; /* dirt color */
      border: 8px solid rgba(34,211,160,0.1);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px rgba(34,211,160,0.15); overflow: hidden;
    }
    .circle-timer::before {
       content: ""; position: absolute; inset: -4px;
       border-radius: 50%;
       background: conic-gradient(var(--neon-green) var(--p, 0%), transparent 0%);
       -webkit-mask: radial-gradient(transparent 135px, #000 136px);
       mask: radial-gradient(transparent 135px, #000 136px);
       pointer-events: none; transition: --p 1s linear;
    }
    .circle-timer::after {
       content: ""; position: absolute; bottom: 0; width: 100%; height: 50px;
       background: #462c0e; border-top-left-radius: 50%; border-top-right-radius: 50%;
       z-index: 1;
    }
    .sky-bg {
       position: absolute; top:0; left:0; width: 100%; height: 100%;
       background: #f1f5cd; border-radius: 50%; z-index: 0;
    }

    .main-tree {
      position: absolute; bottom: 40px; left: 50%; z-index: 2;
      width: 80px; height: 110px; margin-left: -40px;
      transform-origin: bottom center; transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .trt { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 14px; height: 30px; background: #6b4317; }
    .trl1 { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 30px solid transparent; border-right: 30px solid transparent; border-bottom: 40px solid #4caf50; }
    .trl2 { position: absolute; bottom: 45px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 25px solid transparent; border-right: 25px solid transparent; border-bottom: 35px solid #66bb6a; }
    .trl3 { position: absolute; bottom: 65px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; border-bottom: 28px solid #81c784; }

    .view-toggle { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
    .view-btn { padding: 8px 24px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-card); cursor: pointer; color: var(--text-muted); font-weight: 700; transition: all 0.2s;}
    .view-btn.active { background: rgba(34,211,160,0.1); border-color: var(--neon-green); color: var(--neon-green); }

    .timer-text { font-family: var(--font-display); font-size: 4.5rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 20px;}
    
    .forest-grid-wrap {
      display: flex; justify-content: center; align-items: center;
      padding: 60px 0; perspective: 1200px;
      background: radial-gradient(circle at center, rgba(34,211,160,0.08) 0%, transparent 60%);
    }
    .isometric-grid {
      display: grid; grid-template-columns: repeat(6, 45px); grid-template-rows: repeat(6, 45px);
      transform: rotateX(60deg) rotateZ(-45deg); transform-style: preserve-3d; gap: 2px;
    }
    .grid-cell {
      width: 45px; height: 45px; background: #8bc34a;
      border: 1px solid #7cb342; border-radius: 2px; position: relative;
    }
    .grid-cell.dirt { background: #8d6e63; border-color: #795548; }

    .grid-tree {
      position: absolute; bottom: 15px; left: 50%;
      transform: translateX(-50%) rotateZ(45deg) rotateX(-60deg);
      width: 30px; height: 45px; pointer-events: none;
    }
    .gt-trunk { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 4px; height: 10px; background: #5d4037; }
    .gt-leaves { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 14px solid transparent; border-right: 14px solid transparent; border-bottom: 35px solid #43a047; }
    
    .timeline-wrap { display: flex; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 4px; margin-bottom: 20px; }
    .timeline-tab { flex: 1; text-align: center; padding: 10px; border: none; background: transparent; color: var(--text-muted); font-weight: 700; border-radius: 8px; cursor: pointer; transition: 0.2s; }
    .timeline-tab:hover { color: var(--text); }
    .timeline-tab.active { background: #fff; color: #000; }
  </style>
</head>
<body>
<div class="app-container">

  <nav>
    <a href="/" class="nav-brand">
      <div class="logo-icon">⚡</div>
      <div><span class="brand-name">Reality Check</span><span class="brand-sub">Productivity vs Time</span></div>
    </a>
    <ul class="nav-links">
      <li><a href="/">📊 <span>Dashboard</span></a></li>
      <li><a href="/planner">📋 <span>Planner</span></a></li>
      <li><a href="/tracker">⏱️ <span>Tracker</span></a></li>
      <li><a href="/analytics">📈 <span>Analytics</span></a></li>
      <li><a href="/plant" class="active">🌱 <span>Plant</span></a></li>
    </ul>
    <div class="nav-gami" style="display:flex;align-items:center;gap:10px">
      <div class="level-badge">🎮 <span id="nav-level">Lv.1</span></div>
      <div class="xp-chip">⚡ <span id="nav-xp">0 XP</span></div>
    </div>
  </nav>

  <div class="page-wrapper" style="max-width: 800px; margin: 0 auto; padding-top: 20px;">
    
    <div class="view-toggle">
      <button class="view-btn active" id="btn-timer" onclick="switchView('timer')">Timer</button>
      <button class="view-btn" id="btn-overview" onclick="switchView('overview')">Overview</button>
    </div>

    <!-- TIMER VIEW -->
    <div id="view-timer" class="plant-container">
      <div style="font-size: 1.1rem; color: var(--text-2); margin-bottom: 10px;" id="plant-mode-subtitle">Start planting today!</div>
      
      <div class="circle-timer" id="timer-circle">
        <div class="sky-bg"></div>
        <div class="main-tree" id="planted-tree" style="transform: scale(0);">
          <div class="trt"></div>
          <div class="trl1"></div>
          <div class="trl2"></div>
          <div class="trl3"></div>
        </div>
      </div>
      
      <div class="timer-text" id="plant-timer-display">25:00</div>
      
      <div>
        <select id="timer-duration" class="form-control" style="width: auto; display: inline-block; margin-right: 10px; font-size: 1rem; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border);">
          <option value="1">1 Minute (Test)</option>
          <option value="10">10 Minutes</option>
          <option value="25" selected>25 Minutes</option>
          <option value="45">45 Minutes</option>
          <option value="60">60 Minutes</option>
        </select>
        <button class="btn btn-primary btn-lg" id="btn-plant" onclick="startPlanting()" style="background: var(--neon-green); color: #000; box-shadow: 0 4px 15px rgba(34,211,160,0.4); min-width: 120px;">Plant</button>
        <button class="btn btn-danger btn-lg" id="btn-giveup" onclick="giveUp()" style="display:none; min-width: 120px;">Give Up</button>
      </div>
    </div>

    <!-- OVERVIEW VIEW -->
    <div id="view-overview" style="display:none;">
      
      <div class="timeline-wrap">
        <button class="timeline-tab" data-timeline="day" onclick="setTimeline('day')">Day</button>
        <button class="timeline-tab" data-timeline="week" onclick="setTimeline('week')">Week</button>
        <button class="timeline-tab" data-timeline="month" onclick="setTimeline('month')">Month</button>
        <button class="timeline-tab active" data-timeline="year" onclick="setTimeline('year')">Year</button>
      </div>

      <div class="card" style="margin-bottom: 20px; overflow: hidden; padding: 0;">
        <div style="padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
          <h3 style="margin: 0;" id="timeline-subtitle">2026</h3>
          <div style="font-size: 0.9rem; color: var(--text-muted);">🌲 <span id="total-trees">0</span> trees</div>
        </div>
        <div class="forest-grid-wrap">
          <div class="isometric-grid" id="forest-grid">
            <!-- 36 grid cells generated by JS -->
          </div>
        </div>
      </div>

      <div class="card">
        <h3 style="margin-bottom: 15px; font-size: 1.1rem;">Focused Time Distribution</h3>
        <div style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 20px;">
          Total focused time: <span id="total-focus-time" style="color: var(--neon-green); font-weight: bold;">0</span> mins
        </div>
        <div style="height: 250px;">
          <canvas id="forest-chart"></canvas>
        </div>
      </div>

    </div>

  </div>
</div>

<script src="/js/api.js?v=9"></script>
<script src="/js/plant.js?v=1"></script>
</body>
</html>
